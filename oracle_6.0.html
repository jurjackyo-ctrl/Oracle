function fp(p){
  if(!p||isNaN(p))return"$--";
  if(p>=10000)return"$"+Math.round(p).toLocaleString();
  if(p>=100)return"$"+p.toFixed(2);
  if(p>=1)return"$"+p.toFixed(3);
  if(p>=0.01)return"$"+p.toFixed(4);
  return"$"+p.toFixed(5);
}

function fetchCandles(coinId,tf,cb){
  var sym=(BS[coinId]||"btcusdt").toUpperCase();
  var url="https://api.binance.com/api/v3/klines?symbol="+sym+"&interval="+tf.interval+"&limit="+tf.limit;
  fetch(url).then(function(r){return r.json();}).then(function(data){
    if(!Array.isArray(data)||data.length===0){cb(null);return;}
    cb(data.map(function(k){return{open:parseFloat(k[1]),high:parseFloat(k[2]),low:parseFloat(k[3]),close:parseFloat(k[4]),vol:parseFloat(k[5])};}));
  }).catch(function(){cb(null);});
}

function genCandles(coinId,count,seed){
  count=count||60;seed=seed||1234;
  var cfg=CB[coinId];if(!cfg)return[];
  var s=seed+coinId.charCodeAt(0)*997;
  var rand=function(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};
  var rn=function(){var u1=Math.max(1e-10,rand()),u2=rand();return Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);};
  var candles=[];var price=cfg.p/(1+cfg.w);
  for(var i=0;i<count;i++){
    var open=price;price=price*Math.exp((cfg.w/7-0.5*cfg.v*cfg.v)*(1/24)+cfg.v*rn()*Math.sqrt(1/24));
    var close=price,wr=Math.abs(close-open)*(0.3+rand()*1.2);
    candles.push({open:open,high:Math.max(open,close)+wr*rand(),low:Math.min(open,close)-wr*rand(),close:close,vol:cfg.p*0.001*(0.5+rand()*2)});
  }
  var scale=cfg.p/price;
  return candles.map(function(c,i){var t=i/(candles.length-1),f=1+(scale-1)*t;return{open:c.open*f,high:c.high*f,low:c.low*f,close:c.close*f,vol:c.vol};});
}

function catg(t){
  var l=t.toLowerCase();
  if(l.match(/bitcoin|ethereum|crypto|btc|eth|blockchain|defi|nft|solana/))return"CRYPTO";
  if(l.match(/fed|rate|interest|central bank|ecb|monetary|hike|cut|dovish|hawkish/))return"MONETARY";
  if(l.match(/sec|regulation|ban|legal|law|compliance|government/))return"REGULATION";
  if(l.match(/oil|energy|opec|gas|fuel|petroleum/))return"ENERGY";
  if(l.match(/war|conflict|military|sanction|geopolit|invasion|attack/))return"GEOPOLITICAL";
  if(l.match(/virus|pandemic|covid|health|outbreak|disease/))return"HEALTH";
  if(l.match(/crash|recession|plunge|market|stock|selloff/))return"MARKETS";
  if(l.match(/hack|exploit|breach|stolen|theft|security/))return"SECURITY";
  return"ECONOMY";
}

function fetchAllNews(callback){
  var all=[];var done=0;

        }
      }).catch(function(){}).finally(function(){

  });
}

async function claudeAnalyze(text,live){
  var ctx=Object.keys(live).slice(0,6).map(function(k){return k+":"+fp(live[k].price)+"("+live[k].change24h.toFixed(1)+"%)"}).join(" ");
  var prompt="You are a crypto analyst. Event: \""+text+"\"\nCurrent prices: "+ctx+"\n\nRespond ONLY in this JSON format, no markdown:\n{\"verdict\":\"BULLISH|BEARISH|MIXED\",\"confidence\":75,\"analysis\":\"2-3 sentence analysis\",\"predictions\":[{\"coin\":\"BTC\",\"direction\":\"up|down|neutral\",\"change\":\"5.2\"},{\"coin\":\"ETH\",\"direction\":\"up\",\"change\":\"4.1\"},{\"coin\":\"SOL\",\"direction\":\"up\",\"change\":\"7.3\"},{\"coin\":\"XRP\",\"direction\":\"up\",\"change\":\"3.0\"},{\"coin\":\"BNB\",\"direction\":\"up\",\"change\":\"2.5\"},{\"coin\":\"DOGE\",\"direction\":\"up\",\"change\":\"4.0\"}]}";
  var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})});
  var data=await res.json();
  var txt=(data.content&&data.content[0]?data.content[0].text:"").replace(/```json|```/g,"").trim();
  var parsed=JSON.parse(txt);
  var allPreds=COINS.map(function(c){
    var found=parsed.predictions&&parsed.predictions.find(function(p){return p.coin===c.id;});
    if(found)return{coin:c.id,direction:found.direction,change:String(found.change)};
    var dir=parsed.verdict==="BULLISH"?"up":parsed.verdict==="BEARISH"?"down":"neutral";
    return{coin:c.id,direction:dir,change:(Math.random()*2+0.5).toFixed(1)};
  });
  return{rule:"Claude AI",verdict:parsed.verdict,confidence:parsed.confidence,analysis:parsed.analysis,predictions:allPreds,isAI:true};
}

var DR={name:"General",verdict:"MIXED",conf:45,analysis:"This event has unclear implications for cryptocurrency markets.",pct:{default:["neutral",2]}};

function predictRules(text){
  var lower=text.toLowerCase();var matched=null;var best=0;
  for(var i=0;i<RULES.length;i++){var score=RULES[i].kw.filter(function(kw){return lower.includes(kw);}).length;if(score>best){best=score;matched=RULES[i];}}
  var base=matched||DR;
  var v=function(){return parseFloat((Math.random()*1.4-0.7).toFixed(1));};
  return{rule:base.name,verdict:base.verdict,confidence:Math.min(95,Math.max(35,base.conf+Math.floor(Math.random()*6-3))),analysis:base.analysis,isAI:false,
    predictions:COINS.map(function(c){var spec=base.pct[c.id]||base.pct.default||["neutral",2];return{coin:c.id,direction:spec[0],change:Math.max(0.3,spec[1]+v()).toFixed(1)};})};
}

function aggSummary(headlines){
  var results=headlines.map(function(h){return{title:h.title,pred:predictRules(h.title)};});
  var totals={};COINS.forEach(function(c){totals[c.id]={total:0,count:0};});
  results.forEach(function(r){r.pred.predictions.forEach(function(p){var s=p.direction==="up"?+p.change:p.direction==="down"?-p.change:0;totals[p.coin].total+=s;totals[p.coin].count+=1;});});
  var coinSummary=COINS.map(function(c){var avg=totals[c.id].total/(totals[c.id].count||1);return{coin:c.id,avgChange:avg.toFixed(1),direction:avg>0.5?"up":avg<-0.5?"down":"neutral"};});
  var vc={BULLISH:0,BEARISH:0,MIXED:0};results.forEach(function(r){vc[r.pred.verdict]++;});
  var overall=Object.entries(vc).sort(function(a,b){return b[1]-a[1];})[0][0];
  var score=Math.round(((vc.BULLISH-vc.BEARISH)/results.length)*100);
  return{results:results,coinSummary:coinSummary,overall:overall,score:score,vc:vc,
    avgConf:Math.round(results.reduce(function(s,r){return s+r.pred.confidence;},0)/results.length),
    bullish:results.filter(function(r){return r.pred.verdict==="BULLISH";}).map(function(r){return{title:r.title,rule:r.pred.rule};}),
    bearish:results.filter(function(r){return r.pred.verdict==="BEARISH";}).map(function(r){return{title:r.title,rule:r.pred.rule};}),
    total:results.length};
}

function useLivePrices(){
  var s1=useState({});var prices=s1[0];var setPrices=s1[1];
  var s2=useState(false);var connected=s2[0];var setConnected=s2[1];
  var timer=useRef(null);
  function fetch24hr(){
    fetch('https://api.binance.com/api/v3/ticker/24hr?symbols=['+Object.values(BS).map(function(s){return'%22'+s.toUpperCase()+'%22';}).join(',')+']')
      .then(function(r){return r.json();}).then(function(data){
        if(!Array.isArray(data))return;
        var u={};data.forEach(function(d){var coin=Object.keys(BS).find(function(k){return BS[k].toUpperCase()===d.symbol;});if(!coin)return;u[coin]={price:parseFloat(d.lastPrice),change24h:parseFloat(d.priceChangePercent),high24h:parseFloat(d.highPrice),low24h:parseFloat(d.lowPrice)};});
        setPrices(u);setConnected(true);
      }).catch(function(){setConnected(false);});
  }

            style:{background:'#00e5ff',color:'#080b0f',border:'none',fontFamily:'monospace',fontSize:12,padding:'12px 22px',cursor:'pointer',fontWeight:700,letterSpacing:2}
          },'⚡ RUN ANALYSIS')
        ),
        !multiAnim&&multiRes&&e('div',{style:{animation:'fadeIn 0.5s ease'}},
          e('div',{style:{position:'relative',height:12,background:'linear-gradient(90deg,#ff4560,#1a2530 50%,#7fff6e)',borderRadius:2,marginBottom:5}},
            e('div',{style:{position:'absolute',top:-3,left:Math.min(97,Math.max(3,Math.round(50+(multiRes.score/2))))+'%',transform:'translateX(-50%)',width:3,height:18,background:'#fff',borderRadius:2,boxShadow:'0 0 6px #fff8'}})
          ),
          e('div',{style:{display:'flex',justifyContent:'space-between',fontFamily:'monospace',fontSize:7,color:'#4a6070',marginBottom:8}},
            e('span',null,'BEARISH'),e('span',null,'NEUTRAL'),e('span',null,'BULLISH')
          ),
          e('div',{style:{borderLeft:'3px solid '+vc(multiRes.overall),padding:'6px 10px',background:'rgba(0,0,0,0.3)',marginBottom:8}},
            e('div',{style:{fontSize:8,color:'#4a6070',fontFamily:'monospace',marginBottom:2}},'CONSENSUS · '+multiRes.total+' STORIES'),
            e('div',{style:{fontSize:18,fontWeight:800,color:vc(multiRes.overall)}},multiRes.overall),
            e('div',{style:{display:'flex',gap:10,marginTop:3,fontFamily:'monospace',fontSize:8}},
              e('span',{style:{color:'#7fff6e'}},'▲ '+multiRes.vc.BULLISH),
              e('span',{style:{color:'#ff4560'}},'▼ '+multiRes.vc.BEARISH),
              e('span',{style:{color:'#ffcc00'}},'◆ '+multiRes.vc.MIXED)
            )
          ),
          e('div',{style:{fontSize:9,letterSpacing:2,color:'#4a6070',fontFamily:'monospace',marginBottom:5}},'TOP MOVERS'),
          e('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:3}},
            multiRes.coinSummary.slice(0,10).map(function(c){
              var col=dc(c.direction);
              return e('div',{key:c.coin,style:{background:'#080b0f',border:'1px solid '+col+'33',padding:'4px 2px',textAlign:'center'}},
                e('div',{style:{fontWeight:800,fontSize:8}},c.coin),
                e('div',{style:{fontSize:11,color:col}},da(c.direction)),
                e('div',{style:{fontFamily:'monospace',fontSize:7,color:col}},(c.direction==="up"?"+":c.direction==="down"?"-":"±")+Math.abs(parseFloat(c.avgChange))+'%')
              );
            })
          ),
          e('button',{onClick:function(){setSelMulti([]);setMultiRes(null);},style:{marginTop:7,background:'none',border:'1px solid #1a2530',color:'#4a6070',fontFamily:'monospace',fontSize:8,padding:'3px 8px',cursor:'pointer'}},'↺ RESET')
        )
      )
    ),

    // HISTORY row
    e('div',{style:{background:'#0e1318',border:'1px solid #1a2530',padding:14}},
      e('div',{style:{fontSize:10,letterSpacing:3,color:'#4a6070',fontFamily:'monospace',marginBottom:8}},'// ANALYSIS HISTORY'),
      history.length===0
        ?e('div',{style:{fontFamily:'monospace',fontSize:10,color:'#4a6070',opacity:0.5,textAlign:'center',padding:'10px 0'}},'No analyses yet.')
        :e('div',{style:{display:'flex',gap:8,overflowX:'auto',paddingBottom:2}},
          history.map(function(h,i){
            return e('div',{key:i,style:{background:'#080b0f',border:'1px solid #1a2530',padding:'7px 10px',flexShrink:0,maxWidth:210}},
              e('div',{style:{display:'flex',alignItems:'center',gap:5,marginBottom:3}},
                e('div',{style:{width:5,height:5,borderRadius:'50%',background:vc(h.verdict)}}),
                e('span',{style:{fontFamily:'monospace',fontSize:8,color:vc(h.verdict)}},h.verdict)
              ),
              e('div',{style:{fontFamily:'monospace',fontSize:9,lineHeight:1.4,color:'#c8d8e8'}},h.event),
              e('div',{style:{fontFamily:'monospace',fontSize:7,color:'#3a4a5a',marginTop:2}},h.time)
            );
          })
        )
    )
  ),

  tab==='summary'&&e('div',{style:{marginTop:16,animation:'fadeIn 0.4s ease'}},
    !summary&&!summAnim&&e('div',{style:{textAlign:'center',padding:'60px 20px'}},
      e('div',{style:{fontSize:48,marginBottom:14}},'📊'),
      e('div',{style:{fontFamily:'monospace',fontSize:13,color:'#4a6070',marginBottom:22,lineHeight:1.8}},'Analyze top '+Math.min(50,news.length)+' headlines simultaneously',e('br'),'Generate a comprehensive market outlook.'),
      e('button',{onClick:runSummary,style:{background:'#00e5ff',color:'#080b0f',border:'none',padding:'16px 40px',fontWeight:700,fontSize:14,letterSpacing:3,cursor:'pointer'}},'⚡ GENERATE MARKET SUMMARY')
    ),
    summAnim&&e('div',{style:{textAlign:'center',padding:'60px 20px'}},
      e('div',{style:{display:'inline-flex',gap:10,marginBottom:16}},
        ...[0,1,2].map(function(i){return e('div',{key:i,style:{width:10,height:10,borderRadius:'50%',background:["#00e5ff","#ff6b35","#7fff6e"][i],animation:'d'+i+' 1s '+(i*0.2)+'s infinite'}});})),
      e('div',{style:{fontFamily:'monospace',fontSize:12,color:'#4a6070'}},'SCANNING HEADLINES...')
    ),
    summary&&!summAnim&&e('div',{style:{animation:'fadeIn 0.5s ease'}},

      // ── Row 1: verdict + sentiment + stats ──
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:14}},
        e('div',{style:{...card,textAlign:'center'}},
          e('div',{style:lbl},'// OVERALL VERDICT'),
          e('div',{style:{fontSize:34,fontWeight:800,color:vc(summary.overall),marginBottom:6,textShadow:'0 0 20px '+vc(summary.overall)+'66'}},summary.overall),
          e('div',{style:{fontFamily:'monospace',fontSize:10,color:'#4a6070'}},'Based on '+summary.total+' of '+news.length+' stories'),
          e('div',{style:{display:'flex',justifyContent:'center',gap:14,marginTop:10,fontFamily:'monospace',fontSize:11}},
            e('span',{style:{color:'#7fff6e'}},'▲ '+summary.vc.BULLISH),
            e('span',{style:{color:'#ff4560'}},'▼ '+summary.vc.BEARISH),
            e('span',{style:{color:'#ffcc00'}},'◆ '+summary.vc.MIXED)
          )
        ),
        e('div',{style:card},
          e('div',{style:lbl},'// SENTIMENT METER'),
          e('div',{style:{position:'relative',height:18,background:'linear-gradient(90deg,#ff4560,#1a2530 50%,#7fff6e)',borderRadius:2,marginBottom:8,marginTop:6}},
            e('div',{style:{position:'absolute',top:-4,left:Math.round(50+(summary.score/2))+'%',transform:'translateX(-50%)',width:3,height:26,background:'#fff',borderRadius:2,boxShadow:'0 0 6px #fff8'}})
          ),
          e('div',{style:{display:'flex',justifyContent:'space-between',fontFamily:'monospace',fontSize:8,color:'#4a6070',marginBottom:10}},
            e('span',null,'BEARISH'),e('span',null,'NEUTRAL'),e('span',null,'BULLISH')
          ),
          e('div',{style:{textAlign:'center'}},
            e('div',{style:{fontSize:28,fontWeight:800,color:summary.score>=0?'#7fff6e':'#ff4560'}},(summary.score>0?'+':'')+summary.score),
            e('div',{style:{fontFamily:'monospace',fontSize:8,color:'#4a6070'}},'SENTIMENT SCORE')
          )
        ),
        e('div',{style:card},
          e('div',{style:lbl},'// SIGNAL STATS'),
          [['CONFIDENCE',summary.avgConf+'%','#00e5ff',summary.avgConf],
           ['BULLISH',Math.round((summary.vc.BULLISH/summary.total)*100)+'%','#7fff6e',Math.round((summary.vc.BULLISH/summary.total)*100)],
           ['BEARISH',Math.round((summary.vc.BEARISH/summary.total)*100)+'%','#ff4560',Math.round((summary.vc.BEARISH/summary.total)*100)]
          ].map(function(x){
            return e('div',{key:x[0],style:{marginBottom:10}},
              e('div',{style:{display:'flex',justifyContent:'space-between',fontFamily:'monospace',fontSize:9,color:'#4a6070',marginBottom:4}},
                e('span',null,x[0]),e('span',{style:{color:x[2]}},x[1])
              ),
              e('div',{style:{height:3,background:'#1a2530'}},
                e('div',{style:{height:'100%',width:x[3]+'%',background:x[2],transition:'width 1.2s ease'}})
              )
            );
          })
        )
      ),

      // ── Row 2: GAIN brackets (green tiers) ──
      e('div',{style:{...card,marginBottom:14}},
        e('div',{style:{...lbl,color:'#7fff6e'}},'// PROJECTED GAINERS — SPLIT BY BRACKET'),
        e('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}},
          [
            {label:'MOONSHOTS',sub:'> +50%',min:50,max:Infinity,col:'#00ffaa',glow:'#00ffaa'},
            {label:'BIG MOVERS',sub:'+10% – +50%',min:10,max:50,col:'#7fff6e',glow:'#7fff6e'},
            {label:'MILD GAINS',sub:'+5% – +10%',min:5,max:10,col:'#4aaa6e',glow:'#4aaa6e'},
            {label:'MICRO GAINS',sub:'0% – +5%',min:0.5,max:5,col:'#2a7a4e',glow:'#2a7a4e'}
          ].map(function(bucket){
            var coins=summary.coinSummary.filter(function(c){
              var v=parseFloat(c.avgChange);
              return c.direction==='up'&&v>=bucket.min&&v<bucket.max;
            }).sort(function(a,b){return parseFloat(b.avgChange)-parseFloat(a.avgChange);});
            return e('div',{key:bucket.label,style:{background:'#080b0f',border:'1px solid '+bucket.col+'33',padding:'10px 12px'}},
              e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}},
                e('div',{style:{fontFamily:'monospace',fontSize:10,fontWeight:700,color:bucket.col}},bucket.label),
                e('div',{style:{fontFamily:'monospace',fontSize:8,color:'#4a6070'}},bucket.sub)
              ),
              coins.length===0
                ?e('div',{style:{fontFamily:'monospace',fontSize:9,color:'#2a3a4a',padding:'8px 0'}},'No coins in this range')
                :e('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
                  coins.map(function(c){
                    return e('div',{key:c.coin,style:{background:bucket.col+'11',border:'1px solid '+bucket.col+'44',padding:'4px 8px',display:'flex',flexDirection:'column',alignItems:'center',minWidth:52}},
                      e('div',{style:{fontFamily:'monospace',fontSize:10,fontWeight:800,color:'#e8edf2'}},c.coin),
                      live[c.coin]&&e('div',{style:{fontFamily:'monospace',fontSize:7,color:'#4a6070'}},fp(glp(c.coin))),
                      e('div',{style:{fontFamily:'monospace',fontSize:10,fontWeight:700,color:bucket.col}},'+'+parseFloat(c.avgChange).toFixed(1)+'%')
                    );
                  })
                )
            );
          })
        )
      ),

      // ── Row 3: LOSS brackets (red tiers) ──
      e('div',{style:{...card,marginBottom:14}},
        e('div',{style:{...lbl,color:'#ff4560'}},'// PROJECTED LOSERS — SPLIT BY BRACKET'),
        e('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}},
          [
            {label:'MICRO DROPS',sub:'0% – -5%',min:0.5,max:5,col:'#aa3040'},
            {label:'BIG DROPS',sub:'-5% – -10%',min:5,max:10,col:'#cc2040'},
            {label:'HEAVY LOSSES',sub:'-10% – -50%',min:10,max:50,col:'#ff4560'},
            {label:'WIPEOUTS',sub:'> -50%',min:50,max:Infinity,col:'#ff0030'}
          ].map(function(bucket){
            var coins=summary.coinSummary.filter(function(c){
              var v=Math.abs(parseFloat(c.avgChange));
              return c.direction==='down'&&v>=bucket.min&&v<bucket.max;
            }).sort(function(a,b){return parseFloat(a.avgChange)-parseFloat(b.avgChange);});
            return e('div',{key:bucket.label,style:{background:'#080b0f',border:'1px solid '+bucket.col+'33',padding:'10px 12px'}},
              e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}},
                e('div',{style:{fontFamily:'monospace',fontSize:10,fontWeight:700,color:bucket.col}},bucket.label),
                e('div',{style:{fontFamily:'monospace',fontSize:8,color:'#4a6070'}},bucket.sub)
              ),
              coins.length===0
                ?e('div',{style:{fontFamily:'monospace',fontSize:9,color:'#2a3a4a',padding:'8px 0'}},'No coins in this range')
                :e('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
                  coins.map(function(c){
                    return e('div',{key:c.coin,style:{background:bucket.col+'11',border:'1px solid '+bucket.col+'44',padding:'4px 8px',display:'flex',flexDirection:'column',alignItems:'center',minWidth:52}},
                      e('div',{style:{fontFamily:'monospace',fontSize:10,fontWeight:800,color:'#e8edf2'}},c.coin),
                      live[c.coin]&&e('div',{style:{fontFamily:'monospace',fontSize:7,color:'#4a6070'}},fp(glp(c.coin))),
                      e('div',{style:{fontFamily:'monospace',fontSize:10,fontWeight:700,color:bucket.col}},parseFloat(c.avgChange).toFixed(1)+'%')
                    );
                  })
                )
            );
          })
        )
      ),

      // ── Row 4: Bullish / Bearish drivers ──
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}},
        [['🟢 BULLISH DRIVERS',summary.bullish,'#7fff6e','▲'],['🔴 BEARISH DRIVERS',summary.bearish,'#ff4560','▼']].map(function(x){
          var title=x[0],drivers=x[1],color=x[2],arrow=x[3];
          return e('div',{key:title,style:card},
            e('div',{style:{...lbl,color:color}},title+' ('+drivers.length+')'),
            drivers.length===0
              ?e('div',{style:{fontFamily:'monospace',fontSize:10,color:'#4a6070'}},'No signals.')
              :e('div',{style:{display:'flex',flexDirection:'column',gap:6,maxHeight:220,overflowY:'auto'}},
                drivers.map(function(d,i){
                  return e('div',{key:i,style:{display:'flex',gap:8,alignItems:'flex-start'}},
                    e('span',{style:{color:color,fontSize:10,flexShrink:0}},arrow),
                    e('div',null,
                      e('div',{style:{fontSize:10,fontFamily:'monospace',lineHeight:1.4}},d.title.slice(0,72)+(d.title.length>72?'…':'')),
                      e('div',{style:{fontSize:8,color:color,fontFamily:'monospace',marginTop:1}},d.rule)
                    )
                  );
                })
              )
          );
        })
      ),

      e('div',{style:{textAlign:'center'}},
        e('button',{onClick:runSummary,style:{background:'none',border:'1px solid #1a2530',color:'#4a6070',fontFamily:'monospace',fontSize:11,padding:'10px 24px',cursor:'pointer',letterSpacing:2}},'↺ REGENERATE')
      )
    )
  ),

  e('div',{style:{fontFamily:'monospace',fontSize:9,color:'#4a6070',textAlign:'center',padding:'20px 0',borderTop:'1px solid #1a2530',marginTop:16}},
    '⚠ ORACLE IS EXPERIMENTAL — FOR EDUCATIONAL USE ONLY — NOT FINANCIAL ADVICE'
  )
  ));
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Oracle));
</script>
</body>
</html>
